name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch: # allow manual triggers

env:
  GCP_REGION: us-central1
  AR_REPO: pebble
  SERVICE_NAME: pebble-backend
  JOB_NAME: pebble-migrate

permissions:
  id-token: write   # for Workload Identity Federation
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pebble
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pebble_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U pebble"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://pebble:test_password@localhost:5432/pebble_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: pytest -v

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          IMAGE_LATEST: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:latest
        run: |
          docker build -f backend/Dockerfile.staging -t "$IMAGE" -t "$IMAGE_LATEST" backend/
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Run migrations (Cloud Run Job)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          gcloud run jobs update "$JOB_NAME" \
            --image="$IMAGE" \
            --region="$GCP_REGION" \
            --project="${{ secrets.GCP_PROJECT_ID }}"
          gcloud run jobs execute "$JOB_NAME" \
            --region="$GCP_REGION" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --wait

      - name: Deploy Cloud Run service
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE" \
            --region="$GCP_REGION" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Summary
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          echo "### Staging Deploy Complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "**Service:** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ steps.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
